<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - PDG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #141414; margin: 0;">

  <div class="login-card" style="background-color: #1a1a1a; border: 2px solid #dfba6b; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-sizing: border-box; text-align: center;">
    
    <div style="margin-bottom: 20px;">
      <img src="pdg.png" alt="PDG Logo" style="max-height: 70px; width: auto;">
    </div>
    
    <h2 style="color: #dfba6b; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Staff Portal</h2>
    <p style="color: #aaaaaa; font-size: 0.9rem; margin-top: 0; margin-bottom: 30px;">Authorized System Access Only</p>

    <form id="adminLoginForm" onsubmit="handleLogin(event)">
      <div style="text-align: left; margin-bottom: 20px;">
        <label style="color: #dddddd; display: block; margin-bottom: 8px; font-size: 0.9rem;">Username</label>
        <input type="text" id="adminUser" required placeholder="Enter username" style="width: 100%; padding: 12px; background-color: #111111; border: 1px solid #444; border-radius: 4px; color: #fff; box-sizing: border-box; outline: none; font-size: 0.95rem;" onfocus="this.style.borderColor='#dfba6b'" onblur="this.style.borderColor='#444'">
      </div>

      <div style="text-align: left; margin-bottom: 30px;">
  <label style="color: #dddddd; display: block; margin-bottom: 8px; font-size: 0.9rem;">Administrative Password</label>
  <div style="position: relative; width: 100%;">
    <input type="password" id="adminPass" required placeholder="••••••••" style="width: 100%; padding: 12px 45px 12px 12px; background-color: #111111; border: 1px solid #444; border-radius: 4px; color: #fff; box-sizing: border-box; outline: none; font-size: 0.95rem; font-family: inherit;" onfocus="this.style.borderColor='#dfba6b'" onblur="this.style.borderColor='#444'">
    
    <button type="button" id="passwordToggleBtn" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #888888; cursor: pointer; font-size: 1.1rem; padding: 0; outline: none; transition: color 0.2s;" onmouseover="this.style.color='#dfba6b'" onmouseout="if(document.getElementById('adminPass').type === 'password') this.style.color='#888888'; else this.style.color='#dfba6b';">
      👁️
    </button>
  </div>
</div>

      <button type="submit" style="width: 100%; padding: 12px; background-color: #dfba6b; border: none; color: #141414; font-weight: bold; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
        Secure Log In
      </button>
      
      <div id="loginError" style="color: #ff4d4d; font-size: 0.9rem; margin-top: 15px; display: none;">
        ❌ Invalid administrative credentials.
      </div>
    </form>
    
    <div style="margin-top: 25px; border-top: 1px solid #333; padding-top: 15px;">
      <a href="index.html" style="color: #dfba6b; text-decoration: none; font-size: 0.85rem;">← Return to Main Homepage</a>
    </div>
  </div>

  <script>
function togglePasswordVisibility() {
  const passwordInput = document.getElementById('adminPass');
  const toggleButton = document.getElementById('passwordToggleBtn');

  if (passwordInput.type === 'password') {
    // Reveal text string fields
    passwordInput.type = 'text';
    toggleButton.innerText = '🙈'; // Switch icon to a blindfold monkey or crossed-eye alternative
    toggleButton.style.color = '#dfba6b'; // Lock icon color to active gold state
  } else {
    // Hide text string fields back to masked dots
    passwordInput.type = 'password';
    toggleButton.innerText = '👁️'; // Revert back to view eye icon
    toggleButton.style.color = '#888888'; // Revert color to dim gray state
  }
}


    function handleLogin(event) {
      event.preventDefault();
      
      const user = document.getElementById('adminUser').value;
      const pass = document.getElementById('adminPass').value;
      const errorDiv = document.getElementById('loginError');

      // Simple credential verification check
      if (user === "admin" && pass === "pdg2011") {
        errorDiv.style.display = 'none';
        
        // Save a temporary login session token in the administrator's local browser window
        localStorage.setItem("pdg_admin_session", "authenticated_active");
        
        // Forward into the custom row ledger dashboard panel view
        window.location.href = "adminC.html";
      } else {
        errorDiv.style.display = 'block';
        document.getElementById('adminPass').value = ''; // wipe password text input clear
      }
    }
  </script>
</body>
</html>
